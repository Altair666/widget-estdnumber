<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Номера — ЕСТД</title>
<script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f7f7f7;--surf:#FFF;--surf2:#f7f7f7;--surf3:#e5e5e5;
  --brd:#DEDAD2;--brd2:#C4C0B6;
  --tx:#18170F;--tx2:#6A6860;--tx3:#9E9C94;
  --acc:#1E4ED8;--acc-bg:#EEF2FF;--acc-brd:#C7D2FE;
  --grn:#0D6E4E;--grn-bg:#ECFDF5;--grn-brd:#A7F3D0;
  --warn:#92400E;--warn-bg:#FFFBEB;--warn-brd:#FCD34D;
  --red:#991B1B;--red-bg:#FEF2F2;--red-brd:#FECACA;
  --mono:'IBM Plex Mono',monospace;
  --sans:'IBM Plex Sans',sans-serif;
  --r:4pt;--r2:4pt;
}
html,body{height:100%;overflow:hidden;font-family:var(--sans);font-size:13px;color:var(--tx);background:var(--bg)}

/* ── LAYOUT ── */
.app{display:grid;grid-template-columns:200px 1fr;grid-template-rows:auto 1fr;height:100vh;overflow:hidden}
.topbar{grid-column:2;grid-row:1;background:var(--surf);border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:flex-end;padding:0 12px}
.conn-dot{width:6px;height:6px;border-radius:50%;background:var(--red);flex-shrink:0}
.conn-dot.ok{background:var(--grn)}
.conn-lbl{font-size:11px;color:var(--tx3)}
.topbar-status{display:flex;align-items:center;gap:6px;align-self:center;padding:0}
.ver-footer{position:fixed;right:10px;bottom:6px;font-family:var(--mono);font-size:10px;color:var(--tx3);background:var(--surf2);border:1px solid var(--brd);border-radius:4pt;padding:1px 7px;z-index:10}

/* ── SIDEBAR ── */
.sidebar{grid-column:1;grid-row:1/-1;background:var(--surf);border-right:1px solid var(--brd);overflow-y:auto;padding:10px 0;display:flex;flex-direction:column;gap:0}
.sb-section{margin-bottom:12px}
.sb-lbl{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--tx3);padding:0 12px 5px}
.sb-item{display:flex;align-items:center;gap:7px;padding:4px 12px;cursor:pointer;transition:background .1s}
.sb-item:hover{background:var(--surf2)}
.sb-item.active{background:var(--acc-bg)}
.sb-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sb-name{font-size:12px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-code{font-family:var(--mono);font-size:10px;color:var(--tx3)}
.sb-fav-code{font-family:var(--mono);font-size:12px;font-weight:400;color:var(--tx);margin-left:3ch}
.sb-divider{height:1px;background:var(--brd);margin:6px 12px}

/* ── MAIN ── */
.main{grid-column:2;grid-row:2;overflow-y:auto;padding:0;display:flex;flex-direction:column;gap:0}

/* ── PANELS ── */
.panel{background:var(--surf);border:1px solid var(--brd);border-radius:0;overflow:hidden}
#pBrowse>.panel:first-child{border-top:none}
#pBrowse>.panel:first-child>.ph{background:var(--bg)}
.ph{display:flex;align-items:center;justify-content:space-between;height:32px;padding:0 12px;border-bottom:1px solid var(--brd);background:var(--surf2)}
.ph-title{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2)}
.pb{padding:10px 12px}

/* ── ESTD BROWSER ── */
.bc{display:flex;align-items:center;gap:3px;flex-wrap:wrap}
.bc-item{font-size:11px;color:var(--tx2);cursor:pointer;padding:2px 5px;border-radius:4pt;transition:background .1s}
.bc-item:hover{background:var(--surf2)}
.bc-item.cur{color:var(--tx);font-weight:500;cursor:default}
.bc-sep{color:var(--tx3);font-size:11px}

/* Путь выбора — шапка браузера */
.browse-summary{padding:14px 16px;background:var(--surf);display:none;gap:16px;align-items:center;flex-direction:row}
.browse-summary.on{display:flex}
.bs-code{font-family:var(--mono);font-size:28px;font-weight:500;color:var(--tx);line-height:1;flex-shrink:0;text-align:center;min-width:120px}
.bs-path{flex:1;min-width:0}
.bs-row{font-size:15px;color:var(--tx);line-height:1.4}
.browse-step{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 16px;background:var(--surf2);border-top:1px solid var(--brd);border-bottom:1px solid var(--brd);font-size:14px;font-weight:700;color:var(--tx);min-height:17px}
.browse-step:empty{display:none}

/* Карточки классов — строки */
.cls-list{display:flex;flex-direction:column;gap:4px}
.cls-row{display:flex;align-items:center;gap:10px;padding:7px 10px;border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;background:var(--surf);transition:border-color .15s,background .15s}
.cls-row:hover{border-color:var(--brd2);background:var(--surf3)}
.cls-row.sel{border-color:var(--acc);background:var(--acc-bg)}
.cls-row-code{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--tx);flex-shrink:0;min-width:44px}
.cls-row-name{font-size:13px;color:var(--tx);flex:1;line-height:1.3}

/* Подуровни — чуть компактнее */
.sub-list{display:flex;flex-direction:column;gap:3px}
.sub-row{display:flex;align-items:center;gap:10px;padding:6px 10px;border:1px solid var(--brd);border-radius:var(--r);cursor:pointer;background:var(--surf);transition:border-color .15s,background .15s}
.sub-row:hover{border-color:var(--brd2);background:var(--surf3)}
.sub-row.sel{border-color:var(--acc);background:var(--acc-bg)}
.sub-row-code{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--tx);flex-shrink:0;min-width:56px}
.sub-row-name{font-size:12px;color:var(--tx);flex:1;line-height:1.3}

/* ── FORM ── */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx2)}
.form-hint{font-size:10px;color:var(--tx3)}
.form-input{height:32px;border:1px solid var(--brd);border-radius:var(--r);background:#f7f7f7;padding:0 9px;font-family:inherit;font-size:12px;color:var(--tx);outline:none;transition:border-color .15s,background .15s;width:100%}
.form-input:focus{border-color:var(--acc);background:var(--surf)}
.form-input.err{border-color:var(--red)}
.form-input::placeholder{color:var(--tx3)}
.form-select{height:32px;border:1px solid var(--brd);border-radius:var(--r);background:#f7f7f7;padding:0 9px;font-family:inherit;font-size:12px;color:var(--tx);outline:none;width:100%;cursor:pointer}
.form-select:focus{border-color:var(--acc)}

/* kind autocomplete */
.ac-wrap{position:relative}
.ac-drop{position:absolute;top:34px;left:0;right:0;background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);z-index:100;max-height:180px;overflow-y:auto;display:none;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.ac-drop.on{display:block}
.ac-item{padding:6px 9px;cursor:pointer;transition:background .1s;display:flex;align-items:center;gap:7px}
.ac-item:hover,.ac-item.hov{background:var(--acc-bg)}
.ac-code{font-family:var(--mono);font-size:10px;color:var(--acc);flex-shrink:0}
.ac-name{font-size:11px;color:var(--tx);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* preview */
.preview-row{display:flex;align-items:stretch;gap:10px;margin-bottom:10px}
.preview-box{flex:1;background:var(--surf2);border:1px solid var(--brd);border-radius:var(--r);padding:10px 12px;display:flex;flex-direction:column;gap:4px}
.preview-lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3)}
.preview-val{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--tx)}
.preview-val.ready{color:var(--acc)}
.preview-box.next{background:var(--grn-bg);border-color:var(--grn-brd)}
.preview-box.next .preview-lbl{color:var(--grn)}
.preview-box.next .preview-val{color:var(--grn)}
.err-msg{font-size:11px;color:var(--red);margin-top:2px;display:none}
.err-msg.on{display:block}

/* Formed number — input styled like name but green */
.formed-num{font-family:var(--mono);background:var(--grn-bg);border-color:var(--grn-brd);color:var(--grn);font-weight:500;cursor:default}
.formed-num:focus{background:var(--grn-bg);border-color:var(--grn-brd)}

.btn-add{display:flex;align-items:center;justify-content:center;gap:6px;background:#16b378;color:#fff;border:none;border-radius:var(--r);padding:9px 16px;font-family:inherit;font-size:12px;font-weight:500;cursor:pointer;transition:opacity .15s,transform .1s;width:100%}
.btn-add:hover{opacity:.88}
.btn-add:active{transform:scale(.98)}
.btn-add:disabled{opacity:.35;cursor:not-allowed}
.btn-sm{display:inline-flex;align-items:center;gap:4px;border:1px solid var(--brd);border-radius:var(--r);background:var(--surf2);color:var(--tx2);font-size:11px;padding:3px 9px;cursor:pointer;font-family:inherit;transition:background .1s}
.btn-sm:hover{background:var(--surf3)}
.btn-sm:disabled{opacity:.3;cursor:default}

/* ── EMPTY / MISC ── */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px 0;color:var(--tx3);font-size:12px;text-align:center}
.tag{display:inline-flex;align-items:center;font-family:var(--mono);font-size:10px;padding:1px 5px;border-radius:4pt}
.tag-blue{background:var(--acc-bg);color:var(--acc)}
.tag-green{background:var(--grn-bg);color:var(--grn)}
.badge{font-size:10px;padding:1px 6px;border-radius:4pt;font-weight:500}
.badge-level{background:var(--surf3);color:var(--tx2)}

/* ── REGISTERED TABLE ── */
.reg-table{width:100%;border-collapse:collapse;font-size:12px}
.reg-table th{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;color:var(--tx3);padding:5px 8px;border-bottom:2px solid var(--brd);text-align:center;background:var(--surf2)}
.reg-table th.group-header{border-bottom:2px solid var(--brd2);padding-bottom:2px;text-align:center}
.reg-table .sub-header th{font-size:10px;color:var(--tx3);font-weight:500;padding:3px 8px;border-bottom:1px solid var(--brd);background:var(--surf2);text-align:center;white-space:nowrap}
.reg-table td{padding:6px 8px;border-bottom:1px solid var(--brd);vertical-align:top;text-align:center}
.reg-table tr:last-child td{border-bottom:none}
.reg-table tr:hover td{background:var(--surf2)}
.reg-table td.reg-dn{vertical-align:middle}
.reg-dn{font-family:var(--mono);font-size:11px;color:var(--acc);white-space:nowrap}
.reg-name{font-size:12px;color:var(--tx)}
.reg-use-dn{font-family:var(--mono);font-size:11px;color:var(--tx3)}
.reg-use-name{font-size:12px;color:var(--tx2)}
.reg-empty{padding:16px;text-align:center;color:var(--tx3);font-size:12px}

/* Inline edit */
.cell-content{display:flex;align-items:center;justify-content:center;gap:6px;min-height:18px;line-height:1.4}
.cell-text{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center}
.cell-text.reg-use-dn{font-family:var(--mono);font-size:11px;color:var(--acc)}
.cell-text.reg-use-name{font-size:12px;color:var(--tx2)}
.cell-edit-btn{display:inline-flex;align-items:center;justify-content:center;width:20px;height:20px;border:1px solid transparent;border-radius:4pt;background:transparent;color:#E07B1F;cursor:pointer;flex-shrink:0;transition:all .1s;padding:0}
.cell-edit-btn:hover{background:#FFF4E6;color:#C5651A;border-color:#F5D4A0}
.cell-edit-btn.save{color:var(--grn)}
.cell-edit-btn.save:hover{background:var(--grn-bg);color:var(--grn);border-color:var(--grn-brd)}
.cell-edit-btn.save:disabled{opacity:.3;cursor:not-allowed;background:transparent;border-color:transparent}
.cell-edit-btn.cancel{color:var(--red)}
.cell-edit-btn.cancel:hover{background:var(--red-bg);color:var(--red);border-color:var(--red-brd)}
.cell-edit-input{flex:1;height:22px;border:1px solid var(--acc);border-radius:4pt;padding:0 6px;font-family:inherit;font-size:12px;color:var(--tx);outline:none;background:var(--surf);min-width:0;text-align:center}
.cell-edit-input.mono{font-family:var(--mono);font-size:11px;color:var(--acc)}
.cell-edit-wrap{position:relative;flex:1;min-width:0}
.cell-edit-drop{position:absolute;top:24px;left:0;right:0;background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);z-index:200;max-height:180px;overflow-y:auto;box-shadow:0 4px 12px rgba(0,0,0,.12);text-align:left;display:none}
.cell-edit-drop.on{display:block}

/* Reset td padding/alignment for editable cells to keep row heights uniform */
.reg-table td.editable-cell{padding:4px 8px;vertical-align:middle}

/* Author avatar */
.reg-author{padding:6px 8px;text-align:center}
.avatar{display:inline-flex;align-items:center;justify-content:center;width:26px;height:22px;border-radius:4pt;color:#fff;font-size:11px;font-weight:600;font-family:inherit;cursor:default;position:relative;user-select:none;margin:0 auto}
.avatar[data-tooltip]:hover::after{
  content:attr(data-tooltip);
  position:absolute;
  bottom:calc(100% + 6px);
  left:50%;
  transform:translateX(-50%);
  background:var(--tx);
  color:#fff;
  padding:6px 10px;
  border-radius:var(--r);
  font-size:11px;
  font-weight:400;
  white-space:pre;
  z-index:1000;
  box-shadow:0 4px 12px rgba(0,0,0,.15);
  pointer-events:none;
  text-align:left;
  letter-spacing:0;
}
.avatar[data-tooltip]:hover::before{
  content:'';
  position:absolute;
  bottom:calc(100% + 1px);
  left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:var(--tx);
  z-index:1000;
  pointer-events:none;
}

/* ── BROWSER KIND SEARCH ── */
.browser-search-wrap{padding:8px 12px;position:relative;background:var(--surf)}
.browser-search-input{width:100%;height:30px;border:1px solid var(--brd);border-radius:var(--r);background:#f7f7f7;padding:0 9px 0 30px;font-family:inherit;font-size:12px;color:var(--tx);outline:none;transition:border-color .15s}
.browser-search-input:focus{border-color:var(--acc);background:var(--surf)}
.browser-search-input::placeholder{color:var(--tx3)}
.browser-search-icon{position:absolute;left:21px;top:50%;transform:translateY(-50%);color:var(--tx3);pointer-events:none}

::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:4pt}
</style>
</head>
<body>
<div class="app">

<!-- TOPBAR -->
<header class="topbar">
  <div class="topbar-status">
    <div class="conn-dot" id="connDot"></div>
    <span class="conn-lbl" id="connLbl">Ожидание Grist…</span>
  </div>
</header>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sb-section">
    <div class="sb-lbl">⭐ Популярное</div>
    <div id="favList"><div style="padding:4px 12px;font-size:11px;color:var(--tx3)">Нет данных</div></div>
  </div>
  <div class="sb-divider"></div>
  <div class="sb-section">
    <div class="sb-lbl">🕐 Последние</div>
    <div id="recentList"><div style="padding:4px 12px;font-size:11px;color:var(--tx3)">—</div></div>
  </div>
</aside>

<!-- MAIN -->
<main class="main" id="main">

  <!-- BROWSE MODE -->
  <div id="pBrowse" style="display:flex;flex-direction:column;gap:0">

    <!-- ESTD browser -->
    <div class="panel">
      <div class="ph">
        <span class="ph-title">КЛАССИФИКАТОР ОК ЕСТД</span>
        <div class="bc" id="bc"></div>
      </div>
      <!-- Поиск вида внутри браузера -->
      <div class="browser-search-wrap">
        <svg class="browser-search-icon" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input class="browser-search-input" id="browserKindInput" placeholder="Поиск вида по коду или наименованию…" autocomplete="off" oninput="onBrowserKindInput()" onkeydown="onBrowserKindKey(event)">
        <div class="ac-drop" id="browserKindDrop" style="top:32px;left:12px;right:12px"></div>
      </div>
      <div class="browse-summary" id="browseSummary">
        <div class="bs-code" id="bsCode"></div>
        <div class="bs-path" id="bsPath"></div>
      </div>
      <div class="browse-step" id="browseStep"></div>
      <div class="pb" id="browseBody"></div>
    </div>

    <!-- ADD FORM -->
    <div class="panel">
      <div class="ph"></div>
      <div class="pb">

        <!-- form row: prefix + formed number + name -->
        <div style="display:grid;grid-template-columns:90px 1fr 1.4fr;gap:10px;margin-bottom:10px">
          <!-- org prefix combobox -->
          <div class="form-group">
            <label class="form-label">Префикс</label>
            <input class="form-input" id="prefixInput" list="prefixList" value="ЛМАП" placeholder="ЛМАП" oninput="onPrefixInput()" autocomplete="off">
            <datalist id="prefixList">
              <option value="ЛМАП">
              <option value="ЭЛМАП">
            </datalist>
          </div>
          <!-- formed number (read-only, green styled) -->
          <div class="form-group">
            <label class="form-label">Формируемый номер</label>
            <input class="form-input formed-num" id="prevDN" readonly value="—————.—————">
          </div>
          <!-- name -->
          <div class="form-group">
            <label class="form-label">НАИМЕНОВАНИЕ ДОКУМЕНТА <span style="color:var(--red)">*</span></label>
            <input class="form-input" id="nameInput" placeholder="ТЛ. Микроакселерометр одноосный">
          </div>
        </div>

        <!-- hint when no kind picked -->
        <div id="kindPickHint" style="font-size:11px;color:var(--tx3);margin-bottom:10px;display:none">
          Выберите вид в блоке «Классификатор ОК ЕСТД» выше
        </div>

        <!-- primary_use -->
        <div class="form-group" style="margin-bottom:10px">
          <label class="form-label">Первичное применение <span style="color:var(--tx3);font-weight:400;text-transform:none;letter-spacing:0">(необязательно)</span></label>
          <div class="ac-wrap">
            <input class="form-input" id="useInput" placeholder="Поиск сборочной единицы…" autocomplete="off" oninput="onUseInput()" onkeydown="onUseKey(event)">
            <div class="ac-drop" id="useDrop"></div>
          </div>
          <span class="form-hint" id="useHint">Не выбрано</span>
        </div>

        <button class="btn-add" id="btnAdd" disabled onclick="addComponent()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg>
          Зарегистрировать номер
        </button>

      </div>
    </div>

    <!-- REGISTERED COMPONENTS for selected kind -->
    <div class="panel" id="pRegistered" style="display:none">
      <div class="ph">
        <span class="ph-title">Зарегистрированные компоненты</span>
        <span class="tag tag-blue" id="regCount"></span>
      </div>
      <div id="regBody"></div>
    </div>

  </div>
</main>
</div>

<footer class="ver-footer">v0.5</footer>

<script>
/* ═══════════════════════════════════
   STATE
═══════════════════════════════════ */
const S = {
  classifier: [],   // ESTD_classifier records
  components: [],   // Estd_components records
  recent: [],
  // browse
  browseLevel: null, // null=classes, code=drilled
  browsePath: [],    // [{code,name,level}]
  // form
  selKind: null,     // {id, code, name}
  selUse: null,      // {id, estd_number, name}
  showExtPicker: false,  // true когда открыт список «наименование операции» для текущего листа
  pendingLeafKind: null, // лист, выбранный до открытия списка операций (для возврата)
  kindAcIdx: -1,
  useAcIdx: -1,
  browserKindAcIdx: -1,
  // inline edit
  editing: null, // { rowId: number, mode: 'ref'|'compName', selUse: ... }
  // lazy classifier
  classifierMode: 'full',       // 'lazy' | 'full'
  classifierLoadedParents: null, // Set<string> — какие parent_code уже загружены
  classifierLoading: false,      // true пока грузится уровень
  docId: null,       // id документа Grist
  accessToken: null, // токен для доступа к API (SQL endpoint)
  tokenBaseUrl: null,// базовый URL для API с токеном
};

/* Уровни классификатора ЕСТД: вид документации (2 цифры) → вид техпроцесса (+1 цифра, 3 итого)
   → метод выполнения (+2 цифры, 5 итого, лист — регистрируемый «вид»).
   Для некоторых методов выполнения в КТО 1-85-151 есть расширенный код операции
   (+2 цифры, 7 итого) — он хранится один раз с parent_code = голый 2-значный код
   метода (напр. "01"), а не как 144 дубликата под каждым листом, поэтому
   при просмотре листа дети по расширению ищутся отдельно (см. getExtChildren). */
const TOP_LEVEL = 'Вид документации';
const LEAF_LEVEL = 'Метод выполнения';
const EXT_LEVEL = 'Расширенный код операции';
const LEAF_CODE_LEN = 5;
const EXT_CODE_LEN = 2;
const SERIAL_LEN = 5;
const KIND_CODE_RE = new RegExp(`^\\d{${LEAF_CODE_LEN}}(\\d{${EXT_CODE_LEN}})?$`);

/* Узел терминален (регистрируемый), если у него нет обычных детей по parent_code.
   Лист-метод (5 цифр) терминален всегда — наименование операции необязательно
   и подключается отдельной кнопкой, а не принудительным переходом вглубь. */
function isTerminalCode(code) {
  return !S.classifier.some(r => r.parent_code === code);
}

/* Есть ли для данного листа-метода (5 цифр) шаблонные наименования операций в КТО 1-85-151 */
function hasExtOptions(leafCode) {
  const methodCode = String(leafCode).slice(-2);
  return S.classifier.some(r => r.level === EXT_LEVEL && r.parent_code === methodCode);
}

/* Человекочитаемая подпись текущего шага классификатора */
function levelLabel(level) {
  if (level === LEAF_LEVEL) return 'Вид технологического процесса по методу выполнения';
  if (level === EXT_LEVEL) return 'Наименование операции';
  return level;
}

/* Дети узла в дереве просмотра: для листа-метода виртуально подмешиваем
   шаблонные наименования операций (parent_code = 2-значный код метода), склеивая код 7 цифр */
function getNodeChildren(code) {
  const direct = S.classifier.filter(r => r.parent_code === code);
  if (String(code).length === LEAF_CODE_LEN) {
    const methodCode = String(code).slice(-2);
    const ext = S.classifier.filter(r => r.level === EXT_LEVEL && r.parent_code === methodCode);
    if (ext.length) {
      return ext.map(r => ({ ...r, code: code + r.code.slice(-EXT_CODE_LEN), parent_code: code }));
    }
  }
  return direct;
}

const CACHE_KEY = 'estd_widget_classifier_v1'; // bump после изменения формата
const CACHE_TTL = 24 * 60 * 60 * 1000;

/* Мгновенно отрисовать классификатор из localStorage если есть */
function loadFromCache() {
  try {
    const raw = localStorage.getItem(CACHE_KEY);
    if (!raw) return false;
    const data = JSON.parse(raw);
    if (!data || !Array.isArray(data.classifier) || !data.classifier.length) return false;
    if (Date.now() - data.timestamp > CACHE_TTL) return false;
    S.classifier = data.classifier;
    const ageSec = Math.round((Date.now() - data.timestamp) / 1000);
    console.log(`[cache] классификатор: ${S.classifier.length} записей, возраст ${ageSec}с`);
    setConn(true, `${S.classifier.length} видов (кэш)`);
    return true;
  } catch(e) {
    console.warn('[cache] чтение неудачно:', e);
    return false;
  }
}

function saveToCache() {
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify({
      timestamp: Date.now(),
      classifier: S.classifier,
    }));
    console.log('[cache] сохранён');
  } catch(e) {
    console.warn('[cache] не удалось сохранить:', e);
  }
}

/* ═══════════════════════════════════
   GRIST
═══════════════════════════════════ */
let firstComponentsLoadDone = false;

function initGrist() {
  const t0 = performance.now();

  if (typeof grist === 'undefined') {
    setConn(false, 'Grist API не найден');
    renderAll();
    return;
  }

  grist.ready({ requiredAccess: 'full' });
  setConn(true, 'Загрузка…');

  grist.onRecords(() => {
    if (firstComponentsLoadDone) loadComponents();
  });

  grist.onOptions(opts => {
    if (!opts) return;
    if (opts.recent) S.recent = opts.recent;
    renderSidebar();
  });

  // Мгновенный показ из кэша (отложенно)
  setTimeout(() => {
    if (loadFromCache()) renderAll();
  }, 0);

  // Параллельная загрузка
  Promise.all([
    loadClassifier(),
    loadComponents(),
  ]).then(() => {
    console.log(`[init] полная загрузка за ${Math.round(performance.now() - t0)}мс`);
  });
}

async function loadComponents() {
  if (typeof grist === 'undefined') return;
  const t0 = performance.now();
  try {
    const rows = await grist.docApi.fetchTable('Estd_components');
    S.components = rowsToRecords(rows);
    computeNextSerials();
    refreshPrefixList();
    firstComponentsLoadDone = true;
    console.log(`[Estd_components] ${S.components.length} за ${Math.round(performance.now()-t0)}мс`);
    renderAll();
  } catch(e) {
    console.error('Ошибка загрузки Components:', e);
  }
}

async function loadClassifier() {
  if (typeof grist === 'undefined') return;
  const t0 = performance.now();

  // docId и токен — в фоне
  (async () => {
    try {
      if (grist.docApi.getDocName) S.docId = await grist.docApi.getDocName();
    } catch(e) {}
    if (!S.docId) {
      try {
        const refUrl = document.referrer || '';
        const m = refUrl.match(/\/doc\/([^/?#]+)/) || refUrl.match(/\/o\/[^/]+\/([^/?#]+)\//);
        if (m) S.docId = m[1];
      } catch(e) {}
    }
    try {
      if (grist.docApi.getAccessToken) {
        const tokenInfo = await grist.docApi.getAccessToken({ readOnly: true });
        S.accessToken = tokenInfo.token;
        S.tokenBaseUrl = tokenInfo.baseUrl;
      }
    } catch(e) {}
  })();

  // Ждём токен (до 1.5с)
  for (let i = 0; i < 30 && !S.accessToken; i++) {
    await new Promise(r => setTimeout(r, 50));
  }

  // Попытка 1 — ленивая загрузка: только классы (SQL или fetchTable с фильтром)
  const lazyResult = await fetchClassifierByParent(null);

  // Если fetchTable вернул все записи без фильтрации — сразу full mode, не тратим время повторно
  if (lazyResult && lazyResult._fullLoad) {
    S.classifierMode = 'full';
    S.classifier = lazyResult.all;
    S.classifier.sort((a,b) => a.code.localeCompare(b.code, undefined, {numeric:true}));
    console.log(`[ESTD_classifier full] ${S.classifier.length} за ${Math.round(performance.now()-t0)}мс`);
    setConn(true, `${S.classifier.length} видов`);
    setTimeout(saveToCache, 0);
    renderAll();
    return;
  }

  // Ленивый режим — получили только классы
  if (lazyResult && lazyResult.length) {
    S.classifierMode = 'lazy';
    S.classifierLoadedParents = new Set(['']);
    S.classifier = lazyResult;
    S.classifier.sort((a,b) => a.code.localeCompare(b.code, undefined, {numeric:true}));
    console.log(`[ESTD_classifier lazy] ${lazyResult.length} классов за ${Math.round(performance.now()-t0)}мс`);
    setConn(true, `${lazyResult.length} классов`);
    renderAll();
    return;
  }

  // Попытка 2 — SQL полный
  const light = await tryFetchClassifierLight();
  if (light && light.length) {
    S.classifierMode = 'full';
    S.classifier = light;
    S.classifier.sort((a,b) => a.code.localeCompare(b.code, undefined, {numeric:true}));
    console.log(`[ESTD_classifier full SQL] ${S.classifier.length} за ${Math.round(performance.now()-t0)}мс`);
    setConn(true, `${S.classifier.length} видов`);
    setTimeout(saveToCache, 0);
    renderAll();
    return;
  }

  // Попытка 3 — fetchTable (полный)
  try {
    const tables = await grist.docApi.listTables();
    if (!tables.includes('ESTD_classifier')) {
      setConn(false, 'Таблица ESTD_classifier не найдена');
      return;
    }
    const rows = await grist.docApi.fetchTable('ESTD_classifier');
    S.classifierMode = 'full';
    S.classifier = rowsToRecords(rows);
    S.classifier.sort((a,b) => a.code.localeCompare(b.code, undefined, {numeric:true}));
    console.log(`[ESTD_classifier fetchTable] ${S.classifier.length} за ${Math.round(performance.now()-t0)}мс`);
    setConn(true, `${S.classifier.length} видов`);
    setTimeout(saveToCache, 0);
    renderAll();
  } catch(e) {
    setConn(false, 'Ошибка загрузки классификатора');
    console.error(e);
  }
}

/* Попытка лёгкой загрузки через SQL endpoint */
async function tryFetchClassifierLight() {
  // Ждём пока appear accessToken
  for (let i = 0; i < 30 && !S.accessToken; i++) {
    await new Promise(r => setTimeout(r, 50));
  }
  if (!S.accessToken || !S.tokenBaseUrl) return null;

  try {
    const sql = 'SELECT id, code, name, level, parent_code FROM ESTD_classifier';
    const url = `${S.tokenBaseUrl}/sql?q=${encodeURIComponent(sql)}&auth=${S.accessToken}`;
    const res = await fetch(url, { credentials: 'omit', mode: 'cors' });
    if (!res.ok) {
      console.warn(`[SQL] HTTP ${res.status} — fallback на fetchTable`);
      return null;
    }
    const data = await res.json();
    const records = data.records || [];
    return records.map(r => ({
      id: r.id,
      code: r.fields?.code ?? r.code,
      name: r.fields?.name ?? r.name,
      level: r.fields?.level ?? r.level,
      parent_code: r.fields?.parent_code ?? r.parent_code,
    }));
  } catch(e) {
    console.warn('[SQL] не сработал:', e.message);
    return null;
  }
}

/* Загрузить записи по parent_code; null = верхний уровень (Классы).
   Возвращает: массив записей | { _fullLoad: true, all: [...] } | null
   _fullLoad означает: SQL недоступен, fetchTable вернул все записи без фильтрации —
   нужно переключиться в full mode и переиспользовать эти данные. */
async function fetchClassifierByParent(parentCode) {
  // Вариант А: SQL (параметризованный — кириллица через args, не инлайн)
  if (S.accessToken && S.tokenBaseUrl) {
    try {
      const sql = parentCode === null
        ? 'SELECT id, code, name, level, parent_code FROM ESTD_classifier WHERE level = ?'
        : 'SELECT id, code, name, level, parent_code FROM ESTD_classifier WHERE parent_code = ?';
      const args = [parentCode === null ? TOP_LEVEL : parentCode];
      const url = `${S.tokenBaseUrl}/sql?q=${encodeURIComponent(sql)}&args=${encodeURIComponent(JSON.stringify(args))}&auth=${S.accessToken}`;
      const res = await fetch(url, { credentials: 'omit', mode: 'cors' });
      if (res.ok) {
        const data = await res.json();
        const records = (data.records || []).map(r => ({
          id: r.id, code: r.fields?.code ?? r.code, name: r.fields?.name ?? r.name,
          level: r.fields?.level ?? r.level, parent_code: r.fields?.parent_code ?? r.parent_code,
        }));
        if (records.length) { console.log(`[SQL lazy] ${records.length} для '${parentCode}'`); return records; }
      } else { console.warn(`[SQL lazy] HTTP ${res.status}`); }
    } catch(e) { console.warn('[SQL lazy]', e.message); }
  }

  // Вариант Б: fetchTable (с фильтром или без — зависит от версии Grist)
  if (typeof grist !== 'undefined') {
    try {
      const filter = parentCode === null ? { level: [TOP_LEVEL] } : { parent_code: [parentCode] };
      const rows = await grist.docApi.fetchTable('ESTD_classifier', { filters: filter });
      const all = rowsToRecords(rows);
      if (!all.length) return null;

      // Проверяем: фильтр сработал или вернулись все записи?
      const filtered = parentCode === null
        ? all.filter(r => r.level === TOP_LEVEL)
        : all.filter(r => String(r.parent_code) === String(parentCode));

      if (filtered.length && filtered.length === all.length) {
        // Фильтр сработал — ленивый режим
        console.log(`[fetchTable lazy] ${filtered.length} для '${parentCode}'`);
        return filtered;
      } else if (filtered.length < all.length) {
        // Фильтр проигнорирован — вернулись все записи. Сигнализируем full mode.
        console.log(`[fetchTable full] ${all.length} записей (фильтр не поддерживается)`);
        return { _fullLoad: true, all };
      }
    } catch(e) { console.warn('[fetchTable lazy]', e.message); }
  }

  return null;
}

/* Подгрузить детей узла если ещё не загружены */
async function ensureChildrenLoaded(parentCode) {
  if (S.classifierMode === 'full') return;
  if (!S.classifierLoadedParents) S.classifierLoadedParents = new Set();
  if (S.classifierLoadedParents.has(parentCode)) return;

  S.classifierLoading = true;
  renderBrowse();

  const children = await fetchClassifierByParent(parentCode);
  S.classifierLoading = false;

  if (children) {
    const existingCodes = new Set(S.classifier.map(r => r.code));
    children.forEach(r => { if (!existingCodes.has(r.code)) S.classifier.push(r); });
    S.classifierLoadedParents.add(parentCode);
    S.classifier.sort((a,b) => a.code.localeCompare(b.code, undefined, {numeric:true}));
    console.log(`[lazy] +${children.length} для '${parentCode}'`);
  } else {
    S.classifierLoadedParents.add(parentCode);
  }
}

/* Если перед кодом случайно написан префикс (орг.префикс или код класса/группы через точку),
   ищем также «хвост» — то, что идёт после последнего разделителя или буквенного префикса */
function stripCodePrefix(q) {
  if (q.includes('.')) {
    const tail = q.split('.').pop().trim();
    if (tail) return tail;
  }
  const m = q.match(/^[a-zа-яё]+(\d.*)$/i);
  if (m && m[1]) return m[1];
  return q;
}

/* SQL-поиск видов для ленивого режима */
async function searchClassifierKinds(q) {
  const qAlt = stripCodePrefix(q);
  const useAlt = qAlt !== q;
  if (!S.accessToken || !S.tokenBaseUrl) {
    return S.classifier.filter(r =>
      r.level === LEAF_LEVEL &&
      (r.code.toLowerCase().includes(q) || (useAlt && r.code.toLowerCase().includes(qAlt)) || (r.name||'').toLowerCase().includes(q))
    ).slice(0, 30);
  }
  try {
    const pattern = `%${q}%`;
    const sql = useAlt
      ? 'SELECT id, code, name, level, parent_code FROM ESTD_classifier WHERE level = ? AND (LOWER(code) LIKE ? OR LOWER(code) LIKE ? OR LOWER(name) LIKE ?) LIMIT 30'
      : 'SELECT id, code, name, level, parent_code FROM ESTD_classifier WHERE level = ? AND (LOWER(code) LIKE ? OR LOWER(name) LIKE ?) LIMIT 30';
    const args = useAlt ? [LEAF_LEVEL, pattern, `%${qAlt}%`, pattern] : [LEAF_LEVEL, pattern, pattern];
    const url = `${S.tokenBaseUrl}/sql?q=${encodeURIComponent(sql)}&args=${encodeURIComponent(JSON.stringify(args))}&auth=${S.accessToken}`;
    const res = await fetch(url, { credentials: 'omit', mode: 'cors' });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const records = (data.records || []).map(r => ({
      id: r.id, code: r.fields?.code ?? r.code, name: r.fields?.name ?? r.name,
      level: r.fields?.level ?? r.level, parent_code: r.fields?.parent_code ?? r.parent_code,
    }));
    const existingCodes = new Set(S.classifier.map(r => r.code));
    records.forEach(r => { if (!existingCodes.has(r.code)) S.classifier.push(r); });
    return records;
  } catch(e) {
    return S.classifier.filter(r =>
      r.level === LEAF_LEVEL &&
      (r.code.toLowerCase().includes(q) || (useAlt && r.code.toLowerCase().includes(qAlt)) || (r.name||'').toLowerCase().includes(q))
    ).slice(0, 30);
  }
}

/* Загрузить один узел по code (для построения пути в ленивом режиме) */
async function fetchClassifierNodeByCode(code) {
  if (!S.accessToken || !S.tokenBaseUrl) return null;
  try {
    const sql = 'SELECT id, code, name, level, parent_code FROM ESTD_classifier WHERE code = ? LIMIT 1';
    const url = `${S.tokenBaseUrl}/sql?q=${encodeURIComponent(sql)}&args=${encodeURIComponent(JSON.stringify([code]))}&auth=${S.accessToken}`;
    const res = await fetch(url, { credentials: 'omit', mode: 'cors' });
    if (!res.ok) return null;
    const data = await res.json();
    const rec = (data.records || [])[0];
    if (!rec) return null;
    return { id: rec.id, code: rec.fields?.code ?? rec.code, name: rec.fields?.name ?? rec.name,
      level: rec.fields?.level ?? rec.level, parent_code: rec.fields?.parent_code ?? rec.parent_code };
  } catch(e) { return null; }
}

function rowsToRecords(rows) {
  if (!rows || !rows.id) return [];
  return rows.id.map((id, i) => {
    const rec = { id };
    Object.keys(rows).forEach(k => { if (k !== 'id') rec[k] = rows[k][i]; });
    return rec;
  });
}

function setConn(ok, lbl) {
  document.getElementById('connDot').className = 'conn-dot' + (ok ? ' ok' : '');
  document.getElementById('connLbl').textContent = lbl;
}

/* ═══════════════════════════════════
   SERIAL / NEXT FREE
═══════════════════════════════════ */
const serialCache = {}; // "prefix:kindCode" → Set of used serials

function computeNextSerials() {
  Object.keys(serialCache).forEach(k => delete serialCache[k]);
  S.components.forEach(c => {
    const dn = c.estd_number || '';
    const parts = dn.split('.');
    if (parts.length < 2) return;
    const serial = parts[parts.length - 1].padStart(SERIAL_LEN, '0');
    // Ищем код вида (метод выполнения, 5 цифр, либо расширенный код операции, 7 цифр)
    let kindIdx = -1;
    for (let i = parts.length - 2; i >= 0; i--) {
      if (KIND_CODE_RE.test(parts[i])) { kindIdx = i; break; }
    }
    if (kindIdx === -1 || !/^\d+$/.test(serial)) return;
    const kindCode = parts[kindIdx];
    // Префикс = всё что перед кодом вида, склеенное через точку, или org_prefix из записи
    const prefix = (c.org_prefix || parts.slice(0, kindIdx).join('.') || '').trim();
    const key = `${prefix}:${kindCode}`;
    if (!serialCache[key]) serialCache[key] = new Set();
    serialCache[key].add(serial);
  });
}

function nextFreeSerial(kindCode, prefix) {
  const key = `${(prefix||'').trim()}:${kindCode}`;
  const used = serialCache[key] || new Set();
  const max = 10 ** SERIAL_LEN - 1;
  for (let i = 1; i <= max; i++) {
    const s = String(i).padStart(SERIAL_LEN,'0');
    if (!used.has(s)) return s;
  }
  return null;
}

function isSerialFree(kindCode, prefix, serial) {
  const key = `${(prefix||'').trim()}:${kindCode}`;
  const s = String(serial).padStart(SERIAL_LEN,'0');
  return !(serialCache[key] || new Set()).has(s);
}

function addRecent(r) {
  S.recent = [r, ...S.recent.filter(x => x.id !== r.id)].slice(0, 8);
  renderSidebar();
  saveOptions();
}

function saveOptions() {
  if (typeof grist === 'undefined') return;
  try {
    grist.setOptions({
      recent: S.recent.map(r => ({
        id: r.id,
        estd_number: r.estd_number,
        name: r.name,
        estd_kind_name: r.estd_kind_name,
      })),
    });
  } catch(e) {
    console.warn('Failed to save options:', e);
  }
}

function render() {
  renderBrowse();

}

/* ═══════════════════════════════════
   SIDEBAR
═══════════════════════════════════ */
function computeTopKinds() {
  const counts = {};
  S.components.forEach(c => {
    const code = extractKindCodeFromDN(c.estd_number);
    if (!code) return;
    counts[code] = (counts[code] || 0) + 1;
  });
  return Object.keys(counts)
    .sort((a, b) => counts[b] - counts[a])
    .slice(0, 5);
}

function renderSidebar() {
  const favEl = document.getElementById('favList');
  const recEl = document.getElementById('recentList');
  const topKinds = computeTopKinds();
  favEl.innerHTML = topKinds.length
    ? topKinds.map(code => `<div class="sb-item" onclick="goToKindCode('${code}')">
        <span class="sb-fav-code">${esc(code)}</span>
      </div>`).join('')
    : `<div style="padding:4px 12px;font-size:11px;color:var(--tx3)">Нет данных</div>`;

  recEl.innerHTML = S.recent.length
    ? S.recent.map(r => `<div class="sb-item" onclick="goTo(${r.id})">
        <span class="sb-code">${esc(r.estd_number||'—')}</span>
        <span class="sb-name">${esc(r.name||'—')}</span>
      </div>`).join('')
    : `<div style="padding:4px 12px;font-size:11px;color:var(--tx3)">—</div>`;
}

async function goTo(id) {
  const r = S.components.find(x => x.id === id);
  if (!r) return;
  addRecent(r);
  await openKindForComponent(r);
}

/* На вкладке «Регистрация номера» клик по избранному/последнему открывает вид этого компонента в браузере классификатора */
function extractKindCodeFromDN(dn) {
  const parts = (dn || '').split('.');
  for (let i = parts.length - 2; i >= 0; i--) {
    if (KIND_CODE_RE.test(parts[i])) return parts[i];
  }
  return null;
}

/* Найти вид по итоговому коду; для расширенного кода (7 цифр) реальной строки в
   ESTD_classifier может не быть (расширения хранятся один раз как шаблон с
   parent_code = голый код метода) — в этом случае материализуем настоящую
   строку-копию под конкретным листом, чтобы на неё можно было сослаться через Ref */
async function findOrCreateKindByCode(code) {
  code = String(code);
  let kind = S.classifier.find(k => k.code === code);
  if (kind) return kind;
  if (code.length !== LEAF_CODE_LEN + EXT_CODE_LEN) return null;
  const leafCode = code.slice(0, LEAF_CODE_LEN);
  const extSuffix = code.slice(-EXT_CODE_LEN);
  const methodCode = leafCode.slice(-2);
  const tpl = S.classifier.find(r => r.level === EXT_LEVEL && r.parent_code === methodCode && r.code.slice(-EXT_CODE_LEN) === extSuffix);
  if (!tpl) return null;
  try {
    const result = await grist.docApi.applyUserActions([
      ['AddRecord', 'ESTD_classifier', null, { code, name: tpl.name, level: EXT_LEVEL, parent_code: leafCode }]
    ]);
    kind = { id: result.retValues[0], code, name: tpl.name, level: EXT_LEVEL, parent_code: leafCode };
    S.classifier.push(kind);
    return kind;
  } catch(e) {
    console.warn('Не удалось материализовать расширенный код классификатора:', e);
    return null;
  }
}

async function openKindForComponent(r) {
  const code = extractKindCodeFromDN(r.estd_number);
  if (!code) return;
  await goToKindCode(code);
}

async function goToKindCode(code) {
  let kind = await findOrCreateKindByCode(code);
  if (!kind) {
    kind = await fetchClassifierNodeByCode(code);
    if (kind) {
      const existingCodes = new Set(S.classifier.map(x => x.code));
      if (!existingCodes.has(kind.code)) S.classifier.push(kind);
    }
  }
  if (!kind) return;
  pickKind(kind);
  await buildPathForKind(kind);
  renderBrowse();
  renderRegistered();
}

/* ═══════════════════════════════════
   ESTD BROWSER
═══════════════════════════════════ */
function renderBrowse() {
  renderBreadcrumb();
  renderBrowseSummary();
  const body = document.getElementById('browseBody');
  const stepEl = document.getElementById('browseStep');
  const path = S.browsePath;

  if (S.classifierLoading) {
    stepEl.innerHTML = '';
    body.innerHTML = `<div class="empty" style="color:var(--tx3)">Загрузка…</div>`;
    return;
  }
  if (!S.classifier.length) {
    stepEl.innerHTML = '';
    body.innerHTML = `<div class="empty">Классификатор не загружен.<br>Проверьте таблицу ESTD_classifier в Grist.</div>`;
    return;
  }

  if (!path.length) {
    stepEl.innerHTML = `<span>${esc(levelLabel(TOP_LEVEL))}</span>`;
    const classes = S.classifier.filter(r => r.level === TOP_LEVEL);
    body.innerHTML = `<div class="cls-list">${classes.map(c => `
      <div class="cls-row" onclick="browseDrill('${c.code}','${esc(c.name)}','${c.level}')">
        <span class="cls-row-code">${c.code}</span>
        <span class="cls-row-name">${esc(c.name)}</span>
      </div>`).join('')}</div>`;
    return;
  }

  const cur = path[path.length-1];

  if (isTerminalCode(cur.code)) {
    if (cur.level === LEAF_LEVEL) {
      const canExtend = hasExtOptions(cur.code);
      if (S.showExtPicker) {
        stepEl.innerHTML = `<span>${esc(levelLabel(EXT_LEVEL))}</span>`;
        const ext = getNodeChildren(cur.code);
        const cancelRow = `<div class="sub-row" onclick="toggleExtPicker()">
          <span class="sub-row-code">←</span>
          <span class="sub-row-name">Отменить — вернуться к регистрации без наименования операции</span>
        </div>`;
        body.innerHTML = `<div class="sub-list">${cancelRow}${ext.map(c => `
          <div class="sub-row" onclick="browseDrill('${c.code}','${esc(c.name)}','${c.level}')">
            <span class="sub-row-code">${c.code}</span>
            <span class="sub-row-name">${esc(c.name)}</span>
          </div>`).join('')}</div>` + (ext.length ? '' : `<div class="empty">Нет вариантов наименования операции для этого метода</div>`);
      } else {
        stepEl.innerHTML = `<span>${esc(levelLabel(LEAF_LEVEL))}</span>` +
          (canExtend ? `<button class="btn-sm" onclick="toggleExtPicker()">+ Добавить наименование операции</button>` : '');
        body.innerHTML = '';
      }
    } else {
      stepEl.innerHTML = `<span>${esc(levelLabel(cur.level))}</span>`;
      body.innerHTML = '';
    }
    return;
  }

  const children = getNodeChildren(cur.code);
  if (!children.length) {
    stepEl.innerHTML = '';
    body.innerHTML = '';
    return;
  }

  stepEl.innerHTML = `<span>${esc(levelLabel(children[0].level))}</span>`;
  body.innerHTML = `<div class="sub-list">${children.map(c => `
    <div class="sub-row" onclick="browseDrill('${c.code}','${esc(c.name)}','${c.level}')">
      <span class="sub-row-code">${c.code}</span>
      <span class="sub-row-name">${esc(c.name)}</span>
    </div>`).join('')}</div>`;
}

function toggleExtPicker() {
  S.showExtPicker = !S.showExtPicker;
  if (S.showExtPicker) {
    S.pendingLeafKind = S.selKind;
    S.selKind = null;
  } else {
    S.selKind = S.pendingLeafKind || S.selKind;
    S.pendingLeafKind = null;
  }
  updatePreview();
  renderBrowse();
  renderRegistered();
}

function renderBrowseSummary() {
  const path = S.browsePath;
  const summary = document.getElementById('browseSummary');
  if (!path.length) { summary.className = 'browse-summary'; return; }
  summary.className = 'browse-summary on';

  const cur = path[path.length-1];
  document.getElementById('bsCode').textContent = cur.code;
  const pathHtml = `<div class="bs-row">${path.map(p => esc(p.name)).join(', ')}</div>`;
  document.getElementById('bsPath').innerHTML = pathHtml;
}

async function browseDrill(code, name, level) {
  S.browsePath.push({code, name, level});
  S.showExtPicker = false;
  S.pendingLeafKind = null;
  if (level === EXT_LEVEL) {
    const kind = await findOrCreateKindByCode(code);
    if (kind) pickKind(kind);
  } else if (level === LEAF_LEVEL) {
    const kind = S.classifier.find(r => r.code === code);
    if (kind) pickKind(kind);
  } else {
    await ensureChildrenLoaded(code);
  }
  renderBrowse();
  renderRegistered();
}

function browseUp(idx) {
  S.browsePath = S.browsePath.slice(0, idx);
  S.showExtPicker = false;
  S.pendingLeafKind = null;
  const cur = S.browsePath[S.browsePath.length-1];
  S.selKind = (cur && isTerminalCode(cur.code)) ? (S.classifier.find(r => r.code === cur.code) || null) : null;
  updatePreview();
  renderBrowse();
  renderRegistered();
}

function renderBreadcrumb() {
  const bc = document.getElementById('bc');
  let html = `<span class="bc-item ${!S.browsePath.length?'cur':''}" onclick="browseUp(0)">Все классы</span>`;
  S.browsePath.forEach((p,i) => {
    html += `<span class="bc-sep">›</span>`;
    html += `<span class="bc-item ${i===S.browsePath.length-1?'cur':''}" onclick="browseUp(${i+1})">${esc(p.code)}</span>`;
  });
  bc.innerHTML = html;
}

/* ── Browser kind search ── */
async function onBrowserKindInput() {
  const q = document.getElementById('browserKindInput').value.trim().toLowerCase();
  if (!q) { hideDrop('browserKindDrop'); return; }

  let items;
  if (S.classifierMode === 'lazy') {
    items = await searchClassifierKinds(q);
  } else {
    const qAlt = stripCodePrefix(q);
    const useAlt = qAlt !== q;
    items = S.classifier.filter(r =>
      r.level === LEAF_LEVEL &&
      (r.code.toLowerCase().includes(q) || (useAlt && r.code.toLowerCase().includes(qAlt)) || (r.name||'').toLowerCase().includes(q))
    ).slice(0, 30);
  }

  renderAc('browserKindDrop', items, async i => {
    pickKind(items[i]);
    await buildPathForKind(items[i]);
    document.getElementById('browserKindInput').value = '';
    hideDrop('browserKindDrop');
    renderBrowse();
    renderRegistered();
  });
}

function onBrowserKindKey(e) {
  acKey(e, 'browserKindDrop', S, 'browserKindAcIdx', async () => {
    const items = getVisibleAcItems('browserKindDrop');
    if (S.browserKindAcIdx >= 0 && items[S.browserKindAcIdx]) {
      const kind = items[S.browserKindAcIdx]._rec;
      pickKind(kind);
      await buildPathForKind(kind);
      document.getElementById('browserKindInput').value = '';
      hideDrop('browserKindDrop');
      renderBrowse();
      renderRegistered();
    }
  });
}

async function buildPathForKind(kind) {
  const path = [];
  let current = kind;
  while (current) {
    path.unshift({ code: current.code, name: current.name, level: current.level });
    if (!current.parent_code) break;
    let parent = S.classifier.find(r => r.code === current.parent_code);
    if (!parent && S.classifierMode === 'lazy') {
      parent = await fetchClassifierNodeByCode(current.parent_code);
      if (parent) {
        const existingCodes = new Set(S.classifier.map(r => r.code));
        if (!existingCodes.has(parent.code)) S.classifier.push(parent);
      }
    }
    current = parent || null;
  }
  S.browsePath = path;
}

        const initial = author ? author.trim().charAt(0).toUpperCase() : '?';
        const tooltipText = author
          ? `${author}${dateStr ? '\n' + dateStr : ''}`

        const editing = S.editing && S.editing.rowId === c.id;
        const editingDN = editing && S.editing.mode === 'ref';

          useCell = `<div class="cell-content">

              <div class="cell-edit-drop" id="editDNDrop-${c.id}"></div>

            <button class="cell-edit-btn save" id="editSaveBtn-${c.id}" ${S.editing.selUse ? '' : 'disabled'} onclick="saveEditDN(${c.id})" title="Сохранить">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
            </button>
            <button class="cell-edit-btn cancel" onclick="cancelEdit()" title="Отмена">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6 6 18M6 6l12 12"/></svg>
            </button>
          </div>`;
        } else {
          useCell = `<div class="cell-content">
            <span class="cell-text reg-use-name">${linked ? `<span class="reg-use-dn">${esc(linked.estd_number)}</span> — ${esc(linked.name)}` : '—'}</span>

  // После рендера — ставим фокус на активный input

    const inputId = S.editing.mode === 'compName' ? `editCompNameInput-${id}` : `editDNInput-${id}`;

/* ═══════════════════════════════════
   INLINE EDIT — primary_use
═══════════════════════════════════ */
function startEditDN(rowId) {
  S.editing = { rowId, mode: 'ref', selUse: null };
  renderRegistered();
}

function startEditCompName(rowId) {
  S.editing = { rowId, mode: 'compName' };
  renderRegistered();
}

function cancelEdit() {
  S.editing = null;
  renderRegistered();
}

async function saveEditCompName(rowId) {
  if (!S.editing) return;
  const text = (document.getElementById(`editCompNameInput-${rowId}`)?.value || '').trim();
  if (!text) return;
  S.editing = null;

  const idx = S.components.findIndex(c => c.id === rowId);
  if (idx >= 0) S.components[idx].name = text;
  renderRegistered();

  try {
    if (typeof grist !== 'undefined') {
      await grist.selectedTable.update({ id: rowId, fields: { name: text } });
      loadComponents();
    }
  } catch(e) {
    alert('Ошибка сохранения: ' + e.message);
    loadComponents();
  }
}

function onEditDNInput(rowId) {
  const input = document.getElementById(`editDNInput-${rowId}`);
  const q = input.value.trim().toLowerCase();
  // сбрасываем выбор при изменении текста (нужно явно выбрать из списка)
  S.editing.selUse = null;
  document.getElementById(`editSaveBtn-${rowId}`).disabled = true;

  const drop = document.getElementById(`editDNDrop-${rowId}`);
  if (!q) { drop.className = 'cell-edit-drop'; return; }

  const items = S.components.filter(r =>
    r.id !== rowId && // нельзя сослаться на себя
    ((r.estd_number||'').toLowerCase().includes(q) ||
     (r.name||'').toLowerCase().includes(q))
  ).slice(0, 20);

  if (!items.length) { drop.className = 'cell-edit-drop'; return; }

  drop.innerHTML = items.map((r,i) => `
    <div class="ac-item" data-idx="${i}" style="text-align:left">
      <span class="ac-code">${esc(r.estd_number||'')}</span>
      <span class="ac-name">${esc(r.name||'')}</span>
    </div>`).join('');
  drop.querySelectorAll('.ac-item').forEach((el, i) => {
    el._rec = items[i];
    el.addEventListener('mousedown', e => e.preventDefault());
    el.addEventListener('click', () => pickEditDN(rowId, items[i]));
  });
  drop.className = 'cell-edit-drop on';
}

function pickEditDN(rowId, rec) {
  S.editing.selUse = rec;
  document.getElementById(`editDNInput-${rowId}`).value = `${rec.estd_number} — ${rec.name}`;
  document.getElementById(`editDNDrop-${rowId}`).className = 'cell-edit-drop';
  document.getElementById(`editSaveBtn-${rowId}`).disabled = false;
}

function onEditKey(e, rowId) {
  if (e.key === 'Escape') {
    cancelEdit();
  } else if (e.key === 'Enter') {
    if (S.editing.mode === 'ref') {
      if (S.editing.selUse) saveEditDN(rowId);
    } else if (S.editing.mode === 'compName') {
      saveEditCompName(rowId);
    }
  }
}

async function saveEditDN(rowId) {
  if (!S.editing || !S.editing.selUse) return;
  const newUseId = S.editing.selUse.id;
  S.editing = null;

  // Оптимистично
  const idx = S.components.findIndex(c => c.id === rowId);
  if (idx >= 0) {
    S.components[idx].primary_use = newUseId;
  }
  renderRegistered();

  try {
    if (typeof grist !== 'undefined') {
      await grist.selectedTable.update({
        id: rowId,
        fields: { primary_use: newUseId }
      });
      loadComponents();
    }
  } catch(e) {
    alert('Ошибка сохранения: ' + e.message);
    loadComponents();
  }
}

/* Стабильный цвет по имени пользователя */
function avatarColor(name) {
  // Хардкод для системных авторов
  const lc = name.trim().toLowerCase();
  if (lc === 'импорт' || lc === 'import') return '#9E9C94';

  const colors = ['#1E4ED8','#0D6E4E','#92400E','#991B1B','#5B21B6','#0369A1','#166534','#B45309','#7C3AED','#BE185D'];
  let h = 0;
  for (let i = 0; i < name.length; i++) h = ((h << 5) - h + name.charCodeAt(i)) | 0;
  return colors[Math.abs(h) % colors.length];
}

/* ═══════════════════════════════════
   PREVIEW
═══════════════════════════════════ */
function updatePreview() {
  const kind = S.selKind;
  const nameVal = document.getElementById('nameInput').value.trim();
  const prefix = (document.getElementById('prefixInput').value || '').trim().replace(/\.+$/, '');

  const prevDN = document.getElementById('prevDN');
  const btnAdd = document.getElementById('btnAdd');
  const hint = document.getElementById('kindPickHint');

  if (!kind) {
    prevDN.value = '—————.—————';
    btnAdd.disabled = true;
    hint.style.display = 'block';
    hint.textContent = S.showExtPicker
      ? 'Выберите наименование операции выше либо нажмите «Назад к регистрации»'
      : 'Выберите вид в блоке «Классификатор ОК ЕСТД» выше';
    return;
  }
  hint.style.display = 'none';

  const nxt = nextFreeSerial(kind.code, prefix);
  if (!nxt) {
    prevDN.value = 'Все занято';
    btnAdd.disabled = true;
    return;
  }

  prevDN.value = prefix ? `${prefix}.${kind.code}.${nxt}` : `${kind.code}.${nxt}`;
  btnAdd.disabled = !nameVal;
}

function onPrefixInput() {
  updatePreview();
}

function refreshPrefixList() {
  // Собираем уникальные префиксы из существующих записей
  const used = new Set();
  S.components.forEach(c => {
    if (c.org_prefix) {
      const p = String(c.org_prefix).trim().replace(/\.+$/, '');
      if (p) used.add(p);
    }
  });
  // Базовые варианты всегда присутствуют
  ['ЛМАП', 'ЭЛМАП'].forEach(p => used.add(p));
  // Сортируем для стабильности
  const sorted = Array.from(used).sort();
  const datalist = document.getElementById('prefixList');
  if (datalist) {
    datalist.innerHTML = sorted.map(p => `<option value="${esc(p)}">`).join('');
  }
}

// also trigger preview on name input
document.getElementById('nameInput').addEventListener('input', updatePreview);

/* ═══════════════════════════════════
   ADD COMPONENT
═══════════════════════════════════ */
async function addComponent() {
  const kind = S.selKind;
  const name = document.getElementById('nameInput').value.trim();
  if (!kind || !name) return;

  const prefixRaw = (document.getElementById('prefixInput').value || '').trim().replace(/\.+$/, '');
  const prefix = prefixRaw || 'ЛМАП';

  const serial = nextFreeSerial(kind.code, prefix);
  if (!serial) return;

  const btn = document.getElementById('btnAdd');
  btn.disabled = true;
  btn.textContent = 'Сохранение…';

  // Передаём estd_kind, name, org_prefix. serial и estd_number — формульные.
  const fields = {
    estd_kind: kind.id,
    name: name,
    org_prefix: prefix,
  };

  // primary_use — только ссылка на существующий компонент
  if (S.selUse) {
    fields.primary_use = S.selUse.id;
  }

  // Оптимистичное добавление
  const tempId = -Date.now();
  const dn = prefix ? `${prefix}.${kind.code}.${serial}` : `${kind.code}.${serial}`;
  const cacheKey = `${prefix}:${kind.code}`;
  const optimisticRecord = {
    id: tempId,
    estd_number: dn,
    name: name,
    estd_kind: kind.id,
    estd_kind_name: kind.name,
    org_prefix: prefix,
    primary_use: S.selUse ? S.selUse.id : 0,
  };
  S.components.push(optimisticRecord);
  if (!serialCache[cacheKey]) serialCache[cacheKey] = new Set();
  serialCache[cacheKey].add(serial);
  S.recent.unshift({ id: tempId, estd_number: dn, name, estd_kind_name: kind.name });

  renderRegistered();
  renderSidebar();

  try {
    if (typeof grist !== 'undefined') {
      const created = await grist.selectedTable.create({ fields });
      const newId = Array.isArray(created) ? created[0] : (created.id || created);

      // PATCH — перезапускаем trigger-формулу serial
      if (newId) {
        const idx = S.components.findIndex(c => c.id === tempId);
        if (idx >= 0) S.components[idx].id = newId;

        try {
          await grist.selectedTable.update({
            id: newId,
            fields: { estd_kind: kind.id }
          });
        } catch(patchErr) {
          console.warn('PATCH trigger failed:', patchErr);
        }
      }

      // Подтягиваем актуальные данные (с пересчитанными формулами)
      loadComponents();
    }

    // Сброс формы
    document.getElementById('nameInput').value = '';
    document.getElementById('useInput').value = '';
    document.getElementById('useHint').textContent = 'Не выбрано';
    S.selUse = null;
    updatePreview();

    btn.textContent = '✓ Зарегистрировано';
    btn.style.background = 'var(--grn)';
    setTimeout(() => {
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Зарегистрировать номер';
      btn.style.background = '';
      btn.disabled = false;
    }, 2500);

  } catch(e) {
    // Откат
    S.components = S.components.filter(c => c.id !== tempId);
    if (serialCache[cacheKey]) serialCache[cacheKey].delete(serial);
    S.recent = S.recent.filter(r => r.id !== tempId);
    renderRegistered();
    renderSidebar();

    btn.disabled = false;
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 5v14M5 12h14"/></svg> Зарегистрировать номер';
    alert('Ошибка при сохранении: ' + e.message);
  }
}

/* ═══════════════════════════════════
   AUTOCOMPLETE HELPERS
═══════════════════════════════════ */
function renderAc(dropId, items, onPick) {
  const drop = document.getElementById(dropId);
  if (!items.length) { hideDrop(dropId); return; }
  drop.innerHTML = items.map((r,i) => `
    <div class="ac-item" data-idx="${i}">
      <span class="ac-code">${esc(r.code)}</span>
      <span class="ac-name">${esc(r.name)}</span>
    </div>`).join('');
  drop.querySelectorAll('.ac-item').forEach((el,i) => {
    el._rec = items[i];
    el.addEventListener('mousedown', e => { e.preventDefault(); });
    el.addEventListener('click', () => onPick(i));
  });
  drop.className = 'ac-drop on';
}

function renderAcComponents(dropId, items, onPick) {
  const drop = document.getElementById(dropId);
  if (!items.length) { hideDrop(dropId); return; }
  drop.innerHTML = items.map((r,i) => `
    <div class="ac-item" data-idx="${i}">
      <span class="ac-code">${esc(r.estd_number||'')}</span>
      <span class="ac-name">${esc(r.name||'')}</span>
    </div>`).join('');
  drop.querySelectorAll('.ac-item').forEach((el,i) => {
    el._rec = items[i];
    el.addEventListener('mousedown', e => { e.preventDefault(); });
    el.addEventListener('click', () => onPick(i));
  });
  drop.className = 'ac-drop on';
}

function hideDrop(dropId) { const el = document.getElementById(dropId); if (el) el.className = 'ac-drop'; }

function getVisibleAcItems(dropId) {
  return [...document.getElementById(dropId).querySelectorAll('.ac-item')];
}

function acKey(e, dropId, stateObj, idxKey, onEnter) {
  const items = getVisibleAcItems(dropId);
  if (!items.length) return;
  if (e.key === 'ArrowDown') { e.preventDefault(); stateObj[idxKey] = Math.min(stateObj[idxKey]+1, items.length-1); highlightAc(dropId, stateObj[idxKey]); }
  else if (e.key === 'ArrowUp') { e.preventDefault(); stateObj[idxKey] = Math.max(stateObj[idxKey]-1, 0); highlightAc(dropId, stateObj[idxKey]); }
  else if (e.key === 'Enter') { e.preventDefault(); onEnter(); }
  else if (e.key === 'Escape') hideDrop(dropId);
}

function highlightAc(dropId, idx) {
  getVisibleAcItems(dropId).forEach((el,i) => el.className = 'ac-item' + (i===idx?' hov':''));
}

// Close dropdowns on outside click
document.addEventListener('click', e => {
  if (!e.target.closest('.ac-wrap')) {
    hideDrop('kindDrop');
    hideDrop('useDrop');
  }
});

/* ═══════════════════════════════════
   UTILS
═══════════════════════════════════ */
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ═══════════════════════════════════
   BOOT
═══════════════════════════════════ */
initGrist();
</script>
